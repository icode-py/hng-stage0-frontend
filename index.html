<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Todo Task Card | HNG Stage 0</title>
    <style>
        /* All the CSS from Step 2 goes here */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        [data-testid="test-todo-card"] {
            background: white;
            border-radius: 20px;
            padding: 24px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        [data-testid="test-todo-card"]:hover {
            transform: translateY(-5px);
        }

        [data-testid="test-todo-title"] {
            color: #2d3748;
            font-size: 1.5rem;
            margin-bottom: 12px;
        }

        .completed [data-testid="test-todo-title"] {
            text-decoration: line-through;
            opacity: 0.7;
        }

        [data-testid="test-todo-description"] {
            color: #4a5568;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        [data-testid="test-todo-priority"] {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 16px;
        }

        [data-priority="High"] {
            background: #fed7d7;
            color: #c53030;
        }

        [data-priority="Medium"] {
            background: #feebc8;
            color: #c05621;
        }

        [data-priority="Low"] {
            background: #c6f6d5;
            color: #276749;
        }

        .meta-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
            padding: 16px;
            background: #f7fafc;
            border-radius: 12px;
        }

        [data-testid="test-todo-status"] {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.875rem;
            background: #e2e8f0;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding: 12px;
            background: #f7fafc;
            border-radius: 12px;
        }

        [data-testid="test-todo-complete-toggle"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        [data-testid="test-todo-tags"] {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            list-style: none;
            margin-bottom: 24px;
        }

        [data-testid="test-todo-tags"] li {
            background: #edf2f7;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.875rem;
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        button {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        [data-testid="test-todo-edit-button"] {
            background: #4299e1;
            color: white;
        }

        [data-testid="test-todo-delete-button"] {
            background: #f56565;
            color: white;
        }

        button:hover {
            transform: scale(0.95);
            opacity: 0.9;
        }

        button:focus-visible,
        [data-testid="test-todo-complete-toggle"]:focus-visible {
            outline: 3px solid #4299e1;
            outline-offset: 2px;
        }

        @media (max-width: 640px) {
            [data-testid="test-todo-card"] {
                padding: 16px;
            }

            [data-testid="test-todo-title"] {
                font-size: 1.25rem;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <article data-testid="test-todo-card">
        <h2 data-testid="test-todo-title">Complete HNG Frontend Task</h2>

        <p data-testid="test-todo-description">
            Build a fully functional todo card with all required test IDs,
            real-time time remaining updates, and full accessibility support.
        </p>

        <span data-testid="test-todo-priority">High</span>

        <div class="meta-info">
            <time data-testid="test-todo-due-date"></time>
            <time data-testid="test-todo-time-remaining"></time>
            <span data-testid="test-todo-status">Pending</span>
        </div>

        <div class="checkbox-wrapper">
            <input type="checkbox" data-testid="test-todo-complete-toggle" id="completeToggle">
            <label for="completeToggle">Mark as complete</label>
        </div>

        <ul data-testid="test-todo-tags">
            <li data-testid="test-todo-tag-hng">🏆 HNG</li>
            <li data-testid="test-todo-tag-frontend">⚛️ Frontend</li>
            <li data-testid="test-todo-tag-urgent">⚠️ Urgent</li>
        </ul>

        <div class="button-group">
            <button data-testid="test-todo-edit-button">✏️ Edit</button>
            <button data-testid="test-todo-delete-button">🗑️ Delete</button>
        </div>
    </article>

    <script>
        // Due date: April 15, 2026 at 6:00 PM
        const dueDate = new Date(2026, 3, 15, 18, 0, 0);

        function getTimeRemaining() {
            const now = new Date();
            const diff = dueDate - now;

            if (diff <= 0) {
                const overdue = Math.abs(diff);
                const hours = Math.floor(overdue / (1000 * 60 * 60));
                if (hours < 24) {
                    return `Overdue by ${hours} hour${hours !== 1 ? 's' : ''}`;
                }
                const days = Math.floor(hours / 24);
                return `Overdue by ${days} day${days !== 1 ? 's' : ''}`;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (86400000)) / (1000 * 60 * 60));

            if (days > 1) return `Due in ${days} days`;
            if (days === 1) return `Due tomorrow`;
            if (hours > 0) return `Due in ${hours} hour${hours !== 1 ? 's' : ''}`;
            return `Due now!`;
        }

        function formatDueDate() {
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            return `Due ${dueDate.toLocaleDateString('en-US', options)}`;
        }

        function updateTimeRemaining() {
            const timeRemainingEl = document.querySelector('[data-testid="test-todo-time-remaining"]');
            if (timeRemainingEl) {
                timeRemainingEl.textContent = getTimeRemaining();
                timeRemainingEl.setAttribute('datetime', dueDate.toISOString());
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Set due date
            const dueDateEl = document.querySelector('[data-testid="test-todo-due-date"]');
            if (dueDateEl) {
                dueDateEl.textContent = formatDueDate();
                dueDateEl.setAttribute('datetime', dueDate.toISOString());
            }

            // Set initial time remaining
            updateTimeRemaining();

            // Set priority attribute
            const priorityEl = document.querySelector('[data-testid="test-todo-priority"]');
            if (priorityEl) {
                priorityEl.setAttribute('data-priority', priorityEl.textContent);
            }

            // Handle completion toggle
            const checkbox = document.querySelector('[data-testid="test-todo-complete-toggle"]');
            const card = document.querySelector('[data-testid="test-todo-card"]');
            const statusEl = document.querySelector('[data-testid="test-todo-status"]');

            if (checkbox) {
                checkbox.addEventListener('change', () => {
                    if (checkbox.checked) {
                        card.classList.add('completed');
                        statusEl.textContent = 'Completed';
                        statusEl.style.background = '#c6f6d5';
                        statusEl.style.color = '#276749';
                    } else {
                        card.classList.remove('completed');
                        statusEl.textContent = 'Pending';
                        statusEl.style.background = '#e2e8f0';
                        statusEl.style.color = '#4a5568';
                    }
                });
            }

            // Edit button handler
            const editBtn = document.querySelector('[data-testid="test-todo-edit-button"]');
            if (editBtn) {
                editBtn.addEventListener('click', () => {
                    console.log('Edit clicked');
                    alert('✏️ Edit Mode\n\nIn a production app, this would open a modal to edit task details.');
                });
            }

            // Delete button handler
            const deleteBtn = document.querySelector('[data-testid="test-todo-delete-button"]');
            if (deleteBtn) {
                deleteBtn.addEventListener('click', () => {
                    console.log('Delete clicked');
                    if (confirm('Are you sure you want to delete this task?')) {
                        alert('Task deleted! (Demo)');
                    }
                });
            }

            // Update time remaining every 45 seconds
            setInterval(updateTimeRemaining, 45000);
        });
    </script>
</body>

</html>
